# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance
appearance:
  mode: system
  color: emerald

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: ''
    description: 'The highly-customizable Hugo Academic theme powered by Hugo Blox Builder. Easily create your personal academic website.'
    twitter: 'GetResearchDev'
  analytics:
    google_analytics: 'G-3NBZL4Y7YB'
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: ''
    baidu: ''

# Site header
header:
  navbar:
    enable: true
    blox: "navbar"
    fixed_to_top: true
    show_search: true
    show_theme_chooser: true
    logo:
      text: "Aoyang Fang"

# Site footer
footer:
  copyright:
    notice: '© {year} Me. This work is licensed under {license}'
    license:
      enable: true
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'

# Site features
features:
  math:
    enable: true
  privacy_pack:
    enable: true
  # Enable custom CSS
  css:
    enable: true
  # Enable content editing features
  edit_page:
    repo_url: 'https://github.com/username/repo-name'
    content_dir: content
    repo_branch: main
    editable:
      page: true
      post: true
      book: true
  # Enable search functionality
  search:
    enable: true
    provider: wowchemy
    algolia:
      app_id: ''
      api_key: ''
      index_name: ''
      show_logo: false
  # Enable map functionality
  map:
    provider: 'mapnik'
    api_key: ''
    zoom: 15
  # Enable comments
  comments:
    provider: 'disqus'
    commentable:
      post: true
      book: true
      project: true
      publication: true
      event: true
    disqus:
      shortname: ''
  # Enable reading time estimation
  reading_time: true
  # Enable section pager
  section_pager: true
  # Enable sharing buttons
  sharing: true
  # Enable copyright license
  copyright_license:
    enable: true
    allow_derivatives: false
    share_alike: true
    allow_commercial: false
